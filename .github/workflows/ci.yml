name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - production

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build renderer
        run: npm run build

      - name: Check documentation exists
        shell: bash
        run: |
          required_docs=(
            "../docs/projeto/STATUS-ATUAL.md"
            "../docs/projeto/ROADMAP.md"
            "../docs/projeto/GUIA-DESENVOLVEDOR.md"
            "../docs/projeto/GUIA-USUARIO-FINAL.md"
          )
          missing=0
          for doc in "${required_docs[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "::warning::Missing required doc: $doc"
              missing=$((missing + 1))
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "::warning::$missing required docs are missing"
          fi

      - name: Check for sensitive files
        shell: bash
        run: |
          sensitive_patterns=(".env" ".env.local" ".env.production")
          found=0
          for pattern in "${sensitive_patterns[@]}"; do
            if [ -f "$pattern" ]; then
              echo "::error::Sensitive file found: $pattern"
              found=$((found + 1))
            fi
          done
          if [ $found -gt 0 ]; then
            exit 1
          fi
